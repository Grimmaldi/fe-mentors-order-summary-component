<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Order Summary Component - Challenge - Frontend Mentor</title>
</head>
<body>
    <main class="container">
        <img class="illustration-hero" src="./assets/images/illustration-hero.svg" alt="Illustration of woman dancing, while wearing headphones connected to her cellphone.">        
        <article class="order-summary">
            <h1>Order Summary</h1>
            <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            <div class="plan-details">
                <img src="./assets/images/icon-music.svg" alt="" class="musical-notes">
                <div class="plan-name-price">
                    <p>Annual plan</p>
                    <p class="price">$59.99/year</p>
                </div>
                <a class="change-plan-link" href="http://">Change</a>
            </div>
            <div>
                <button class="pay">Proceed to Payment</button>
            </div>
            <div>
                <button class="cancel">Cancel Order</button>
            </div>
        </article>
    </main>
</body>
</html>
